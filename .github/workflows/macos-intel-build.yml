name: macOS Intel Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/macos-intel-build.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'
      - 'src-tauri/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'tailwind.config.js'
      - 'postcss.config.js'

jobs:
  build-macos-intel:
    name: Build macOS Intel installer
    runs-on: macos-15-intel
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: install frontend dependencies
        run: npm ci

      - name: build macOS Intel app and installer
        run: npm run tauri -- build --target x86_64-apple-darwin

      - name: upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trauso-macos-intel
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error
